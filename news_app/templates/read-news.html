{% extends 'base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<section class="news-block">
            <div class="container-fluid">
                <div class="news-block_content">
                    <h3 class="mb-10">{{ post.title }}</h3>
                    <p class="mb-15">{{ post.created_at|date:"d.m.Y" }}</p>
                    <img src="{{ post.image_url }}"
                         alt="" class="rounded-full-img">
                    <p class="mb-15">{{ post.description }}</p>
                    <a href="#">#{{ post.category.name }}</a>
                </div>
                <div class="news-block_adv">
                    <h3>Advertising</h3>
                    <div class="news-adv_card">
                        <img src="https://images.all-free-download.com/images/thumbjpg/hd_flower_picture_01_hd_pictures_167032.jpg" alt="" class="news-adv_img">
                        <img src="https://images.all-free-download.com/images/thumbjpg/hd_flower_picture_01_hd_pictures_167032.jpg" alt="" class="news-adv_img">

                    </div>
                </div>
            </div>
        </section>
{% endblock %}
